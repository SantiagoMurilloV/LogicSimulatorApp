<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="180" height="180" fill="#0a0a0a"/>

  <!-- Outer hexagon (subtle glow border) -->
  <polygon points="90,10 160,45 160,115 90,150 20,115 20,45"
    fill="none" stroke="#4a8cc2" stroke-width="0.8" opacity="0.5"/>

  <!-- Inner hexagon (main body) -->
  <polygon points="90,16 154,49 154,111 90,144 26,111 26,49"
    fill="#1a3a5c" stroke="#1e4d7a" stroke-width="2.5"/>

  <!-- Inner fill -->
  <polygon points="90,20 150,51 150,109 90,140 30,109 30,51"
    fill="#1e4a6e" opacity="0.6"/>

  <!-- Horizontal trace line -->
  <line x1="30" y1="80" x2="150" y2="80" stroke="#4a8cc2" stroke-width="0.5" opacity="0.3" stroke-dasharray="2,4"/>

  <!-- Corner dots (purple) -->
  <circle cx="50" cy="30" r="2.5" fill="#8b5cf6" opacity="0.7"/>
  <circle cx="130" cy="30" r="2.5" fill="#8b5cf6" opacity="0.7"/>
  <circle cx="50" cy="130" r="2.5" fill="#8b5cf6" opacity="0.7"/>
  <circle cx="130" cy="130" r="2.5" fill="#8b5cf6" opacity="0.7"/>

  <!-- Corner trace lines (purple) -->
  <line x1="40" y1="24" x2="54" y2="34" stroke="#8b5cf6" stroke-width="0.8" opacity="0.5"/>
  <line x1="140" y1="24" x2="126" y2="34" stroke="#8b5cf6" stroke-width="0.8" opacity="0.5"/>
  <line x1="40" y1="136" x2="54" y2="126" stroke="#8b5cf6" stroke-width="0.8" opacity="0.5"/>
  <line x1="140" y1="136" x2="126" y2="126" stroke="#8b5cf6" stroke-width="0.8" opacity="0.5"/>

  <!-- AND/NAND Gate body (centered) -->
  <path d="M 58 62 L 82 62 A 22 22 0 0 1 82 98 L 58 98 Z"
    fill="#2a6090" stroke="#5ba3d9" stroke-width="1.8" opacity="0.9"/>

  <!-- Gate label -->
  <text x="72" y="85" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#a8d4f0" opacity="0.9">&amp;</text>

  <!-- Negation bubble -->
  <circle cx="108" cy="80" r="5.5" fill="none" stroke="#4ade80" stroke-width="1.5"/>

  <!-- Input wires -->
  <line x1="12" y1="72" x2="58" y2="72" stroke="#4ade80" stroke-width="1.8"/>
  <line x1="12" y1="88" x2="58" y2="88" stroke="#4ade80" stroke-width="1.8"/>

  <!-- Input pin dots -->
  <circle cx="12" cy="72" r="4.5" fill="#4ade80"/>
  <circle cx="12" cy="88" r="4.5" fill="#4ade80"/>

  <!-- Gate input junction dots -->
  <circle cx="58" cy="72" r="2.5" fill="#4ade80"/>
  <circle cx="58" cy="88" r="2.5" fill="#4ade80"/>

  <!-- Output wire -->
  <line x1="113" y1="80" x2="168" y2="80" stroke="#4ade80" stroke-width="1.8"/>

  <!-- Output junction dot -->
  <circle cx="114" cy="80" r="2.5" fill="#4ade80"/>

  <!-- Output pin dot -->
  <circle cx="168" cy="80" r="4.5" fill="#4ade80"/>
</svg>
